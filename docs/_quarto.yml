# This file controls the settings for your Quarto template from www.marvinschmitt.com

# website settings
website:
  title: "Shufei Fang"                                # Your name
  description: "1st year master student in system biology and bioinformatics"   # A brief slogan (optional)
  image: img/my_image.jpg
  
  favicon: img/favicon.png
  
  # start of the navigation bar at the top of the website
  navbar:
    pinned: true
    logo: /img/logo.png
    
    # your sub-pages
    left:
      - text: "Photography"
        href: photography/index.qmd
      - text: "CV"
        href: cv/index.qmd
      - text: "Blog"
        href: blog/index.qmd
    
    # your social media handles
    right:
      - icon: instagram
        href: https://www.instagram.com/fryevie201?igsh=MW5nN2Y4azVvYm51bA==
      - icon: linkedin
        href: https://www.linkedin.com/in/shufei-fang-8b3b97199?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app
      - icon: envelope
        aria-label: email
        href: "mailto:sxf596@case.edu" 
  
  

# Don't touch unless you know what you are doing :) ------------
  search: 
    location: navbar
    type: textbox
  page-footer: 
    left: |
      <span class="faux-block">&#169; 2023 Marvin Schmitt CC BY-SA 4.0</span>
    center: |
      <span class="faux-block"><a href="https://www.marvinschmitt.com/blog/website-tutorial-quarto/">View the tutorial for this template!</a></span>
    right: |
      <span class="faux-block"><a href="https://github.com/marvinschmitt/quarto-website-template/">View source on GitHub</a></span>

project:
  type: website
  output-dir: docs

  preview: 
    port: 22222
    browser: true
    watch-inputs: true
    navigate: true

execute:
  freeze: true

format:
  html:
    fontsize: 1.1em
    theme: 
      - pulse
      - html/styles.scss
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true